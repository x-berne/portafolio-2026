<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mi Portafolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #1e1e24; /* Gris oscuro, no negro */
      --text-main: #EFEFEF; /* Casi blanco */
      
      /* Color de acento principal y derivados con similar luminosidad */
      --accent-orange: #FF4F00;
      --accent-red: #FF3B3B;
      --accent-yellow: #FFC000;
      --accent-blue: #3B82F6;
      --accent-violet: #A855F7;
      --accent-green: #22C55E;
    }

    body { 
      font-family: 'Inter', sans-serif;
      font-weight: 400; /* Regular */
      background-color: var(--bg-dark);
      color: var(--text-main); 
      padding: 40px 20px; 
      margin: 0;
      line-height: 1.5; /* Interlineado generoso para textos largos */
      
      /* Efecto sutil nocturno estrellado */
      background-image: 
        radial-gradient(rgba(239, 239, 239, 0.15) 1px, transparent 1px),
        radial-gradient(rgba(239, 239, 239, 0.1) 1px, transparent 1px);
      background-size: 50px 50px, 90px 90px;
      background-position: 0 0, 25px 25px;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      line-height: 1; /* Interlineado en bloque */
      margin: 0 0 16px;
      font-weight: 700;
    }

    h1 {
      font-size: 3rem;
      text-align: center;
      margin-bottom: 60px;
      color: var(--accent-orange);
      text-shadow: 2px 2px 0px rgba(0,0,0,0.3);
    }

    .grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
      gap: 40px; 
      max-width: 1200px;
      margin: 0 auto;
    }

    .card { 
      background: rgba(30, 30, 36, 0.7); 
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px; 
      overflow: hidden;
      backdrop-filter: blur(8px);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s ease;
    }

    .card:hover {
      transform: translateY(-8px);
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.4);
      border-color: rgba(255, 79, 0, 0.3);
    }

    .bento-gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2px;
      border-bottom: 2px solid var(--accent-orange);
      background-color: rgba(255, 255, 255, 0.05);
    }
    .bento-gallery img { 
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: filter 0.3s ease;
    }
    .bento-gallery img:first-child {
      grid-column: 1 / -1;
      height: auto;
      max-height: 500px;
    }
    .bento-gallery img:not(:first-child) {
      aspect-ratio: 1 / 1;
    }
    .bento-gallery img:hover {
      filter: brightness(1.2);
    }

    .card .info { 
      padding: 24px; 
    }

    .card h3 { 
      font-size: 1.5rem;
      margin-bottom: 12px;
      color: var(--text-main);
    }

    .card p { 
      margin: 0; 
      color: #A0A0A0; 
      font-size: 0.95rem;
      font-weight: 600; /* SemiBold */
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center; /* Texto centrado horizontalmente en mobile */
      justify-content: flex-start; /* Texto arriba en mobile */
      text-align: center; /* Centrar el texto en sí mismo en mobile */
      width: 100%;
      margin: 0 0 80px 0;
      padding: 40px 20px; 
      min-height: 85vh; 
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background-size: auto 150%; 
      background-position: center bottom; 
      position: relative;
    }
    
    .hero::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to bottom, rgba(30,30,36,1) 0%, rgba(30,30,36,0.8) 50%, rgba(30,30,36,0) 100%); /* Gradiente de arriba abajo en mobile */
      z-index: 1;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 100%; /* Todo el ancho en mobile */
      width: 100%;
    }

    @media (min-width: 768px) {
      .hero {
        align-items: flex-end; /* Mueve el bloque de texto a la derecha en desktop */
        justify-content: center; /* Centrado vertical */
        text-align: left; /* Restaura el texto a la izquierda en desktop */
        padding: 100px 40px;
        min-height: 65vh;
        background-size: cover; 
        background-position: left center; /* Sujeto a la izquierda en desktop */
      }
      .hero::before {
        background: linear-gradient(to left, rgba(30,30,36,1) 0%, rgba(30,30,36,0.9) 35%, rgba(30,30,36,0) 70%); /* Gradiente lateral en desktop */
      }
      .hero-content {
        max-width: 50%; /* Arranca en la mitad y va a la derecha */
      }
    }

    .hero-content h1 {
      font-size: 3rem;
      text-align: inherit;
      margin-bottom: 16px;
      text-shadow: none;
      color: var(--text-main);
    }

    @media (min-width: 768px) {
      .hero-content h1 {
        font-size: 4rem;
      }
    }

    .hero-content h2 {
      font-family: 'Inter', sans-serif;
      font-size: 1.1rem;
      color: var(--accent-orange);
      font-weight: 800; /* ExtraBold */
      letter-spacing: 2px;
      margin-bottom: 20px;
      text-transform: uppercase;
    }

    .hero-content p {
      font-size: 1.125rem;
      color: #C0C0C0;
      margin-bottom: 40px;
      line-height: 1.7;
    }

    .hero-btn {
      display: inline-block;
      background: var(--accent-orange);
      color: #fff;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      text-transform: uppercase;
      text-decoration: none;
      padding: 16px 32px;
      border-radius: 8px;
      transition: background 0.3s ease, transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .hero-btn:hover {
      background: var(--accent-red);
      transform: translateY(-4px);
    }
    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center; /* Centrado en mobile */
    }
    
    @media (min-width: 768px) {
      .hero-actions {
        justify-content: flex-start; /* A la izquierda en desktop */
      }
    }

    .hero-btn-whatsapp {
      background: var(--accent-green);
      color: #1e1e24;
    }

    .hero-btn-whatsapp:hover {
      background: #1da34f;
      color: #1e1e24;
    }
    
    .section-title {
      font-size: 2rem;
      text-align: center;
      margin-bottom: 48px;
      color: var(--text-main);
    }
    
    .bento-gallery img:not(:first-child):last-child:nth-child(even) {
      grid-column: 1 / -1;
      aspect-ratio: 2 / 1;
    }

    .grid-pisos {
      display: flex;
      flex-direction: column;
      gap: 80px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card-piso {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .card-piso .info-piso h3 {
      font-size: 2.5rem;
      margin: 0;
      color: var(--accent-orange);
      text-transform: uppercase;
      font-family: 'Space Mono', monospace;
      text-align: left;
    }

    .card-piso.reverse .info-piso h3 {
      text-align: right;
    }

    .card-piso .bento-gallery {
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.4);
      border-bottom: none;
    }
  </style>
</head>
<body>
  <header class="hero" id="hero-header" style="display: none;">
    <div class="hero-content">
      <h2 id="hero-greeting"></h2>
      <h1 id="hero-title"></h1>
      <p id="hero-bio"></p>
      <div class="hero-actions">
        <a id="btn-main-cta" href="#" class="hero-btn">Hablemos de tu proyecto</a>
        <a id="btn-email" href="#" class="hero-btn" style="display: none;">Contactar por Email</a>
        <a id="btn-whatsapp" href="https://wa.me/5492477464726" target="_blank" rel="noopener noreferrer" class="hero-btn hero-btn-whatsapp" style="display: none;">WhatsApp</a>
      </div>
    </div>
  </header>

  <div id="proyectos-container"></div>

  <script>
    const projectId = "j67rip91";
    const dataset = "production";
    const query = encodeURIComponent(`{
      "perfil": *[_type == "perfil"][0]{nombre, profesion, "fotoUrl": foto.asset->url, bio, email},
      "proyectos": *[_type == "proyecto"]{titulo, categoria, "imagenes": imagenes[].asset->url, videoVimeo}
    }`);
    const url = `https://${projectId}.api.sanity.io/v2024-01-01/data/query/${dataset}?query=${query}`;

    fetch(url)
      .then(res => res.json())
      .then(data => {
        // Cargar Perfil
        const perfil = data.result.perfil;
        if (perfil) {
          const heroHeader = document.getElementById('hero-header');
          heroHeader.style.display = 'flex';
          if (perfil.fotoUrl) {
            heroHeader.style.backgroundImage = `url(${perfil.fotoUrl})`;
          }
          if (perfil.nombre) document.getElementById('hero-greeting').textContent = `Hola, soy ${perfil.nombre}`;
          if (perfil.profesion) document.getElementById('hero-title').textContent = perfil.profesion;
          if (perfil.bio) document.getElementById('hero-bio').textContent = perfil.bio;
          const mainCta = document.getElementById('btn-main-cta');
          const btnWhatsapp = document.getElementById('btn-whatsapp');
          const btnEmail = document.getElementById('btn-email');

          mainCta.addEventListener('click', (e) => {
            e.preventDefault();
            mainCta.style.display = 'none';
            btnWhatsapp.style.display = 'inline-block';
            if (perfil.email) {
              btnEmail.style.display = 'inline-block';
            }
          });

          if (perfil.email) {
            btnEmail.href = "#";
            btnEmail.addEventListener('click', (e) => {
              e.preventDefault();
              navigator.clipboard.writeText(perfil.email).then(() => {
                const textOriginal = btnEmail.textContent;
                btnEmail.textContent = '¡Email copiado!';
                setTimeout(() => { btnEmail.textContent = textOriginal; }, 2000);
              });
            });
          }
        }

        // Cargar Proyectos
        const proyectos = data.result.proyectos || [];
        const containerMaster = document.getElementById('proyectos-container');
        
        const catMap = {
          'fotografia': 'FOTOGRAFÍA',
          'diseno': 'DISEÑO',
          'video': 'VIDEO'
        };

        const groups = {};
        proyectos.forEach(p => {
          const c = p.categoria || 'otros';
          if(!groups[c]) groups[c] = [];
          groups[c].push(p);
        });

        for (const cat in groups) {
          const section = document.createElement('section');
          section.style.marginBottom = '80px';
          
          const sectionTitle = document.createElement('h2');
          sectionTitle.className = 'section-title';
          sectionTitle.textContent = catMap[cat] || cat.toUpperCase();
          section.appendChild(sectionTitle);

          const grid = document.createElement('div');
          if (cat === 'fotografia') {
            grid.className = 'grid-pisos';
          } else {
            grid.className = 'grid';
          }
          
          groups[cat].forEach((proyecto, index) => {
            const card = document.createElement('div');
            card.className = cat === 'fotografia' ? 'card-piso' : 'card';
            
            if (cat === 'fotografia' && index % 2 !== 0) {
              card.classList.add('reverse');
            }

            const imagenesArr = proyecto.imagenes || [];
            const imagenesHtml = imagenesArr.length > 0 ? 
              `<div class="bento-gallery">
                ${imagenesArr.map(url => `<img src="${url}" alt="${proyecto.titulo}">`).join('')}
               </div>` : '';

            let videoHtml = '';
            if (proyecto.videoVimeo) {
              const vimeoMatch = proyecto.videoVimeo.match(/(\d+)/);
              if (vimeoMatch) {
                videoHtml = `<div style="padding:56.25% 0 0 0;position:relative;"><iframe src="https://player.vimeo.com/video/${vimeoMatch[0]}" style="position:absolute;top:0;left:0;width:100%;height:100%;" frameborder="0" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe></div><script src="https://player.vimeo.com/api/player.js"><\/script>`;
              }
            }

            if (cat === 'fotografia') {
              card.innerHTML = `
                <div class="info-piso">
                  <h3>${proyecto.titulo}</h3>
                </div>
                ${videoHtml}
                ${imagenesHtml}
              `;
            } else {
              card.innerHTML = `
                ${videoHtml}
                ${imagenesHtml}
                <div class="info">
                  <h3>${proyecto.titulo}</h3>
                </div>
              `;
            }
            grid.appendChild(card);
          });
          section.appendChild(grid);
          containerMaster.appendChild(section);
        }
      })
      .catch(err => console.error('Error trayendo datos:', err));
  </script>
</body>
</html>
