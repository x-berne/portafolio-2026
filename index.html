<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Portafolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://api.fontshare.com/v2/css?f[]=clash-display@200,300,400,500,600,700&f[]=satoshi@300,400,500,700,900&display=swap" rel="stylesheet">
  
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #1e1e24; /* Gris oscuro, no negro */
      --text-main: #FAFAFA; /* Blanco casi puro */
      
      /* Color de acento principal y derivados con similar luminosidad */
      --accent-orange: #FF4F00;
      --accent-red: #FF3B3B;
      --accent-yellow: #FFC000;
      --accent-blue: #3B82F6;
      --accent-violet: #A855F7;
      --accent-green: #22C55E;
    }

    body { 
      font-family: 'Satoshi', sans-serif;
      font-weight: 400; /* Regular */
      background-color: var(--bg-dark);
      color: var(--text-main); 
      margin: 0;
      line-height: 1.5; /* Interlineado generoso para textos largos */
      overflow-x: hidden; /* Evita el scroll horizontal de la página */
    }

    canvas#starfield {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    h1, h2, h3, h4, h5, h6 {
      font-family: 'Clash Display', sans-serif;
      text-transform: uppercase;
      line-height: 1;
    }

    h1 {
      font-weight: 700;
    }

    h2 {
      font-weight: 500;
    }

    h3, h4, h5, h6 {
      font-weight: 300;
    }

    /* Custom Hero styling mixed with Bootstrap */
    .hero {
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background-size: 100% auto; 
      background-position: center bottom; 
      background-repeat: no-repeat;
      position: relative;
    }
    
    @media (max-width: 767px) {
      .hero {
        padding-bottom: 75vw; /* Reserves space for the horizontal photo at the bottom */
      }
    }
    
    .hero::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.8) 50%, rgba(0,0,0,0) 100%);
      z-index: 0;
    }

    .hero-content {
      position: relative;
      z-index: 2;
    }

    @media (min-width: 768px) {
      .hero {
        background-size: cover; 
        background-position: left center;
        min-height: 100vh;
      }
      .hero::before {
        background: linear-gradient(to left, rgba(0,0,0,1) 0%, rgba(0,0,0,0.9) 35%, rgba(0,0,0,0) 70%);
      }
      .hero-content {
        max-width: 50%;
      }
    }

    .hero-title-text {
      font-size: 2rem;
      margin-bottom: 24px;
      color: var(--accent-orange);
      line-height: 1.1;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }

    @media (min-width: 768px) {
      .hero-title-text { font-size: 5rem; }
    }

    .hero-greeting-text {
      font-size: 1.1rem;
      color: var(--accent-orange);
      font-weight: 400;
      margin-bottom: 20px;
    }

    .hero-desc-text {
      font-size: 1.125rem;
      color: var(--text-main);
      line-height: 1.7;
    }

    /* Botones personalizados que complementan Bootstrap */
    .btn-custom {
      display: inline-block;
      background: var(--accent-orange);
      color: #fff;
      font-family: 'Clash Display', sans-serif;
      font-weight: 500;
      text-transform: uppercase;
      padding: 16px 32px;
      border-radius: 8px;
      transition: background 0.3s ease, transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      border: none;
    }

    .btn-custom:hover {
      background: var(--accent-red);
      color: #fff;
      transform: translateY(-4px);
    }

    .btn-whatsapp {
      background: var(--accent-green);
      color: #1e1e24;
    }

    .btn-whatsapp:hover {
      background: #1da34f;
      color: #1e1e24;
    }

    /* Timeline Experiencia */
    .timeline-container {
      position: relative;
      padding-left: 24px;
      margin-left: 8px;
      border-left: 2px solid rgba(255, 255, 255, 0.1);
    }
    .timeline-item {
      position: relative;
      margin-bottom: 32px;
    }
    .timeline-item:last-child {
      margin-bottom: 0;
    }
    .timeline-dot {
      position: absolute;
      left: -31px;
      top: 6px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background-color: var(--accent-orange);
      box-shadow: 0 0 10px var(--accent-orange);
    }
    .timeline-period {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }
    .timeline-role {
      text-transform: uppercase;
      margin-bottom: 2px;
      color: #fff;
    }
    .timeline-company {
      font-size: 1rem;
      color: var(--accent-yellow);
      margin-bottom: 12px;
    }
    .timeline-desc {
      font-size: 0.95rem;
      color: #bbb;
      line-height: 1.5;
    }

    @media (min-width: 768px) {
      .timeline-container {
        display: flex;
        overflow-x: auto;
        padding-left: 0;
        padding-top: 32px;
        margin-left: 0;
        margin-top: 16px;
        border-left: none;
        border-top: 2px solid rgba(255, 255, 255, 0.1);
        gap: 40px;
        scrollbar-width: thin;
      }
      .timeline-item {
        flex: 1;
        min-width: 280px;
        margin-bottom: 0;
      }
      .timeline-dot {
        left: 0;
        top: -39px;
      }
    }
    /* Estilos Acordeón Habilidades */
    .skill-accordion {
      margin-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 16px;
    }
    .skill-accordion:last-child {
      border-bottom: none;
    }
    .skill-category-header {
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .skill-arrow {
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      fill: var(--accent-yellow);
    }
    .skill-accordion.expanded .skill-arrow {
      transform: rotate(-180deg);
    }
    .skill-tags-wrapper {
      position: relative;
      overflow: hidden;
      max-height: 44px; /* Approx 1 row of badges */
      transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .skill-accordion.expanded .skill-tags-wrapper {
      max-height: 1000px;
    }
    .skill-fade-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 30px;
      background: linear-gradient(to bottom, rgba(30, 30, 36, 0) 0%, rgba(30, 30, 36, 1) 100%);
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .skill-accordion.expanded .skill-fade-overlay {
      opacity: 0;
    }
    
    .section-title {
      font-size: 1.75rem;
      font-weight: 400;
      color: var(--text-main);
    }

    /* Glassmorphism card */
    .glass-card { 
      background: rgba(30, 30, 36, 0.7); 
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px; 
      overflow: hidden;
      backdrop-filter: blur(8px);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s ease;
      height: 100%;
    }

    .glass-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 16px 32px rgba(0, 0, 0, 0.4);
      border-color: rgba(255, 79, 0, 0.3);
    }

    /* Galería Simple */
    .simple-gallery {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
    .simple-gallery img { 
      width: 100%;
      height: auto;
      display: block;
      transition: filter 0.3s ease;
    }
    .simple-gallery img.is-portrait {
      grid-column: span 1;
    }
    .simple-gallery img.is-landscape {
      grid-column: 1 / -1;
    }
    .simple-gallery img:hover {
      filter: brightness(1.2);
    }

    /* Carrusel de Proyectos (Center Mode con Previews) */
    .portfolio-carousel {
      background-color: transparent;
      overflow: hidden; /* Contiene las vistas previas dentro del ancho del proyecto */
      position: relative;
    }
    .portfolio-carousel .carousel-inner {
      overflow: visible !important;
      width: 80%;
      margin: 0 auto;
    }
    @media (min-width: 768px) {
      .portfolio-carousel .carousel-inner {
        width: 60%;
      }
    }
    .portfolio-carousel .carousel-item {
      display: none !important;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 380px; /* Alto en mobile */
      opacity: 0;
      transform: scale(0.7) translateX(0);
      transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s ease, filter 0.6s ease !important;
      z-index: 0;
      pointer-events: none;
    }
    @media (min-width: 768px) {
      .portfolio-carousel .carousel-item {
        height: 550px; /* Alto en desktop */
      }
    }
    .portfolio-carousel .carousel-item img {
      height: 100%;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      margin: 0 auto;
      display: block;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      background-color: rgba(0, 0, 0, 0.15);
    }
    
    /* Mostrar solo los tres elementos activos y colindantes */
    .portfolio-carousel .carousel-item.active,
    .portfolio-carousel .carousel-item.prev-item,
    .portfolio-carousel .carousel-item.next-item {
      display: block !important;
      opacity: 0.4;
      filter: brightness(0.3);
      z-index: 1;
    }
    
    .portfolio-carousel .carousel-item.active {
      opacity: 1 !important;
      filter: brightness(1) !important;
      transform: scale(1) translateX(0) !important;
      z-index: 3 !important;
      position: relative; /* Define la altura */
      pointer-events: auto;
    }
    
    .portfolio-carousel .carousel-item.prev-item {
      transform: scale(0.8) translateX(-65%) !important;
      z-index: 2 !important;
      pointer-events: auto;
      cursor: pointer;
    }
    .portfolio-carousel .carousel-item.next-item {
      transform: scale(0.8) translateX(65%) !important;
      z-index: 2 !important;
      pointer-events: auto;
      cursor: pointer;
    }
    @media (min-width: 768px) {
      .portfolio-carousel .carousel-item.prev-item {
        transform: scale(0.8) translateX(-60%) !important;
      }
      .portfolio-carousel .carousel-item.next-item {
        transform: scale(0.8) translateX(60%) !important;
      }
    }

    /* Ajustar flechas de control para que no queden tapadas */
    .portfolio-carousel .carousel-control-prev,
    .portfolio-carousel .carousel-control-next {
      width: 10%;
      z-index: 4;
    }

    .card-title-custom {
      font-size: 1.5rem;
      color: var(--text-main);
    }

    .card-piso-title {
      font-size: 2.5rem;
      color: var(--accent-orange);
    }

    /* Lightbox Premium (Pantalla Completa) */
    .lightbox-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(15px);
      z-index: 9999;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .lightbox-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .lightbox-image {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.8);
      transform: scale(0.9);
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .lightbox-overlay.active .lightbox-image {
      transform: scale(1);
    }
    .lightbox-close-btn {
      position: absolute;
      top: 24px;
      right: 24px;
      background: transparent;
      border: none;
      color: var(--text-main);
      font-size: 2.5rem;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.2s ease, transform 0.2s ease;
      line-height: 1;
      width: 48px;
      height: 48px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 50%;
      background-color: rgba(255, 255, 255, 0.05);
    }
    .lightbox-close-btn:hover {
      opacity: 1;
      transform: scale(1.1) rotate(90deg);
      background-color: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>
  <canvas id="starfield"></canvas>
  <header class="hero d-flex flex-column justify-content-start justify-content-md-center align-items-start align-items-md-end text-start px-3 px-md-5 pt-5 pt-md-0 mt-4 mt-md-0" id="hero-header" style="display: none !important;">
    <div class="hero-content w-100">
      <h3 id="hero-greeting" class="hero-greeting-text text-uppercase"></h3>
      <h1 id="hero-title" class="hero-title-text text-uppercase text-start"></h1>
      <p id="hero-bio" class="hero-desc-text mb-4 mb-md-5"></p>
      <div class="d-flex flex-wrap gap-3 justify-content-start">
        <a id="btn-main-cta" href="#" class="btn btn-custom text-decoration-none">Hablemos de tu proyecto</a>
        <a id="btn-email" href="#" class="btn btn-custom text-decoration-none" style="display: none;">Contactar por Email</a>
        <a id="btn-whatsapp" href="https://wa.me/5492477464726" target="_blank" rel="noopener noreferrer" class="btn btn-custom btn-whatsapp text-decoration-none" style="display: none;">WhatsApp</a>
      </div>
    </div>
  </header>

  <section class="container py-5 mt-4" style="position: relative; z-index: 2;">
    <div id="perfil-extras" class="w-100" style="display: none;"></div>
  </section>

  <main class="container py-4" id="proyectos-container" style="position: relative; z-index: 2;"></main>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    function updateCarouselPreviews(carouselEl, activeTarget) {
      const items = carouselEl.querySelectorAll('.carousel-item');
      const activeIndex = Array.from(items).indexOf(activeTarget);
      
      items.forEach((item, idx) => {
        item.classList.remove('prev-item', 'next-item');
        if (items.length > 1) {
          const prevIdx = (activeIndex - 1 + items.length) % items.length;
          const nextIdx = (activeIndex + 1) % items.length;
          
          if (idx === prevIdx) {
            item.classList.add('prev-item');
          } else if (idx === nextIdx) {
            item.classList.add('next-item');
          }
        }
      });
    }

    const projectId = "j67rip91";
    const dataset = "production";
    const query = encodeURIComponent(`{
      "perfil": *[_type == "perfil"][0]{
        nombre, profesion, "fotoUrl": foto.asset->url, bio, email,
        habilidades,
        "herramientas": herramientas[]{ nombre, "iconoUrl": icono.asset->url },
        experiencia
      },
      "proyectos": *[_type == "proyecto"]{titulo, categoria, tipoGaleria, "imagenes": imagenes[].asset->url, videoVimeo}
    }`);
    const url = `https://${projectId}.api.sanity.io/v2024-01-01/data/query/${dataset}?query=${query}`;

    fetch(url)
      .then(res => res.json())
      .then(data => {
        // Cargar Perfil
        const perfil = data.result.perfil;
        if (perfil) {
          const heroHeader = document.getElementById('hero-header');
          heroHeader.style.setProperty('display', 'flex', 'important');
          if (perfil.fotoUrl) {
            heroHeader.style.backgroundImage = `url(${perfil.fotoUrl})`;
          }
          if (perfil.nombre) document.getElementById('hero-greeting').textContent = perfil.nombre;
          if (perfil.profesion) document.getElementById('hero-title').textContent = perfil.profesion;
          if (perfil.bio) document.getElementById('hero-bio').textContent = perfil.bio;
          const mainCta = document.getElementById('btn-main-cta');
          const btnWhatsapp = document.getElementById('btn-whatsapp');
          const btnEmail = document.getElementById('btn-email');

          mainCta.addEventListener('click', (e) => {
            e.preventDefault();
            mainCta.style.display = 'none';
            btnWhatsapp.style.setProperty('display', 'inline-block', 'important');
            if (perfil.email) {
              btnEmail.style.setProperty('display', 'inline-block', 'important');
            }
          });

          if (perfil.email) {
            btnEmail.href = "#";
            btnEmail.addEventListener('click', (e) => {
              e.preventDefault();
              navigator.clipboard.writeText(perfil.email).then(() => {
                const textOriginal = btnEmail.textContent;
                btnEmail.textContent = '¡Email copiado!';
                setTimeout(() => { btnEmail.textContent = textOriginal; }, 2000);
              });
            });
          }

          // Renderizar extras del perfil
          const extrasContainer = document.getElementById('perfil-extras');
          let extrasHtml = '';

          // 1. Habilidades
          if (perfil.habilidades && perfil.habilidades.length > 0) {
            extrasHtml += '<h2 class="mt-5 mb-4 text-uppercase">HABILIDADES</h2>';
            extrasHtml += '<div class="d-flex flex-column">';
            perfil.habilidades.forEach((hab, index) => {
              extrasHtml += `
                <div class="skill-accordion pt-2" onclick="this.classList.toggle('expanded')">
                  <div class="skill-category-header">
                    <h3 class="mb-0" style="color: var(--accent-yellow); font-size: 1.25rem;">${hab.categoria}</h3>
                    <svg class="skill-arrow" width="12" height="10" viewBox="0 0 12 10" xmlns="http://www.w3.org/2000/svg">
                      <polygon points="0,0 12,0 6,10" />
                    </svg>
                  </div>
                  <div class="skill-tags-wrapper mt-3">
                    <div class="skill-tags-content d-flex flex-wrap gap-2 pb-2">
                      ${(hab.items || []).map(item => `<span class="badge" style="background-color: rgba(255,255,255,0.1); font-weight: normal; font-size: 0.9rem;">${item}</span>`).join('')}
                    </div>
                    <div class="skill-fade-overlay"></div>
                  </div>
                </div>
              `;
            });
            extrasHtml += '</div>';
          }
          // 2. Herramientas
          if (perfil.herramientas && perfil.herramientas.length > 0) {
            extrasHtml += `
              <div class="mt-5">
                <h2 class="mb-4 text-uppercase d-flex align-items-center flex-wrap gap-3">
                  HERRAMIENTAS
                  <div class="d-flex flex-wrap gap-3 align-items-center" style="margin-top: -2px;">
                    ${perfil.herramientas.map(herr => herr.iconoUrl ? `<img src="${herr.iconoUrl}" alt="${herr.nombre || 'Herramienta'}" title="${herr.nombre || ''}" data-bs-toggle="tooltip" data-bs-placement="top" style="width: 32px; height: 32px; object-fit: contain; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5)); cursor: pointer; transition: transform 0.2s ease;" onmouseover="this.style.transform='scale(1.2)'" onmouseout="this.style.transform='scale(1)'">` : '').join('')}
                  </div>
                </h2>
              </div>
            `;
          }

          // 3. Experiencia
          if (perfil.experiencia && perfil.experiencia.length > 0) {
            extrasHtml += `
              <div class="mt-5">
                <h2 class="mb-4 text-uppercase d-flex align-items-center flex-wrap gap-3">
                  EXPERIENCIA
                </h2>
                <div class="timeline-container">
                  ${perfil.experiencia.map(exp => `
                    <div class="timeline-item">
                      <div class="timeline-dot"></div>
                      <div class="timeline-period">${exp.periodo || 'Actualidad'}</div>
                      <h3 class="timeline-role fs-5">${exp.rol || ''}</h3>
                      <div class="timeline-company">${exp.empresa || ''}</div>
                      <div class="timeline-desc">${exp.descripcion ? exp.descripcion.replace(/\n/g, '<br>') : ''}</div>
                    </div>
                  `).join('')}
                </div>
              </div>
            `;
          }

          if (extrasHtml !== '') {
            extrasContainer.innerHTML = extrasHtml;
            extrasContainer.style.display = 'block';
            const tooltipTriggerList = extrasContainer.querySelectorAll('[data-bs-toggle="tooltip"]');
            [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl));
          }
        }

        // Cargar Proyectos
        const proyectos = data.result.proyectos || [];
        const containerMaster = document.getElementById('proyectos-container');
        
        const catMap = {
          'fotografia': 'FOTOGRAFÍA',
          'diseno': 'DISEÑO',
          'video': 'VIDEO'
        };

        const groups = {};
        proyectos.forEach(p => {
          const c = p.categoria || 'otros';
          if(!groups[c]) groups[c] = [];
          groups[c].push(p);
        });

        for (const cat in groups) {
          const section = document.createElement('section');
          section.className = 'mb-5 pb-5';
          
          const headerContainer = document.createElement('div');
          headerContainer.className = 'd-flex align-items-center gap-3 mb-5';
          
          const sectionTitle = document.createElement('h3');
          sectionTitle.className = 'section-title m-0';
          sectionTitle.textContent = catMap[cat] || cat.toUpperCase();
          
          const divider = document.createElement('hr');
          divider.className = 'flex-grow-1 border-secondary opacity-25 m-0';
          
          headerContainer.appendChild(sectionTitle);
          headerContainer.appendChild(divider);
          section.appendChild(headerContainer);

          const grid = document.createElement('div');
          grid.className = 'd-flex flex-column gap-5';
          
          groups[cat].forEach((proyecto, index) => {
            const card = document.createElement('div');
            card.className = 'd-flex flex-column gap-4';
            
            const imagenesArr = proyecto.imagenes || [];
            let imagenesHtml = '';
            
            if (imagenesArr.length > 0) {
              const esCarrusel = proyecto.tipoGaleria === 'carrusel';
              
              if (esCarrusel) {
                const carouselId = `carousel-${index}-${cat}`;
                const hasMultiple = imagenesArr.length > 1;
                
                const itemsHtml = imagenesArr.map((url, imgIdx) => `
                  <div class="carousel-item ${imgIdx === 0 ? 'active' : ''}">
                    <img src="${url}" alt="${proyecto.titulo}">
                  </div>
                `).join('');
                
                const indicatorsHtml = hasMultiple ? `
                  <div class="carousel-indicators">
                    ${imagenesArr.map((_, imgIdx) => `
                      <button type="button" data-bs-target="#${carouselId}" data-bs-slide-to="${imgIdx}" class="${imgIdx === 0 ? 'active' : ''}" aria-current="${imgIdx === 0 ? 'true' : 'false'}"></button>
                    `).join('')}
                  </div>
                ` : '';
                
                const controlsHtml = hasMultiple ? `
                  <button class="carousel-control-prev" type="button" data-bs-target="#${carouselId}" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Anterior</span>
                  </button>
                  <button class="carousel-control-next" type="button" data-bs-target="#${carouselId}" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Siguiente</span>
                  </button>
                ` : '';
                
                imagenesHtml = `
                  <div id="${carouselId}" class="carousel slide portfolio-carousel mb-3" data-bs-ride="false">
                    ${indicatorsHtml}
                    <div class="carousel-inner">
                      ${itemsHtml}
                    </div>
                    ${controlsHtml}
                  </div>
                `;
              } else {
                imagenesHtml = `
                  <div class="simple-gallery">
                    ${imagenesArr.map(url => `<img src="${url}" alt="${proyecto.titulo}" class="img-fluid rounded" onload="this.classList.add(this.naturalHeight > this.naturalWidth ? 'is-portrait' : 'is-landscape')">`).join('')}
                  </div>
                `;
              }
            }

            let videoHtml = '';
            if (proyecto.videoVimeo) {
              const vimeoMatch = proyecto.videoVimeo.match(/(\d+)/);
              if (vimeoMatch) {
                const vimeoId = vimeoMatch[0];
                const containerId = `vimeo-container-${vimeoId}-${index}`;
                videoHtml = `<div id="${containerId}" class="w-100 mb-3"><div class="text-center py-3"><div class="spinner-border spinner-border-sm text-light" role="status"></div></div></div>`;
                
                fetch(`https://vimeo.com/api/oembed.json?url=https://vimeo.com/${vimeoId}`)
                  .then(res => res.json())
                  .then(videoData => {
                    const container = document.getElementById(containerId);
                    if (container) {
                      const isPortrait = videoData.height > videoData.width;
                      const percentage = (videoData.height / videoData.width) * 100;
                      const maxStyles = isPortrait ? 'max-width: 320px; margin: 0 auto;' : '';
                      
                      container.innerHTML = `
                        <div style="${maxStyles}">
                          <div class="ratio" style="--bs-aspect-ratio: ${percentage}%;">
                            <iframe src="https://player.vimeo.com/video/${vimeoId}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
                          </div>
                        </div>
                      `;
                    }
                  })
                  .catch(err => {
                    console.error('Error fetching Vimeo oEmbed:', err);
                    const container = document.getElementById(containerId);
                    if (container) {
                      container.innerHTML = `
                        <div class="ratio ratio-16x9">
                          <iframe src="https://player.vimeo.com/video/${vimeoId}" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
                        </div>
                      `;
                    }
                  });
              }
            }

            card.innerHTML = `
              <div class="text-start">
                <h3 class="card-piso-title m-0 text-uppercase">${proyecto.titulo}</h3>
              </div>
              ${imagenesHtml}
              ${videoHtml}
            `;
            grid.appendChild(card);
          });
          section.appendChild(grid);
          containerMaster.appendChild(section);
        }

        // Inicializar vistas previas y eventos de click para carruseles center-mode
        document.querySelectorAll('.portfolio-carousel').forEach(carouselEl => {
          const activeItem = carouselEl.querySelector('.carousel-item.active');
          if (activeItem) {
            updateCarouselPreviews(carouselEl, activeItem);
          }
          
          carouselEl.addEventListener('slide.bs.carousel', event => {
            updateCarouselPreviews(carouselEl, event.relatedTarget);
          });
          
          carouselEl.addEventListener('click', event => {
            const prevItem = event.target.closest('.prev-item');
            const nextItem = event.target.closest('.next-item');
            if (prevItem) {
              const carouselInstance = bootstrap.Carousel.getOrCreateInstance(carouselEl);
              carouselInstance.prev();
            } else if (nextItem) {
              const carouselInstance = bootstrap.Carousel.getOrCreateInstance(carouselEl);
              carouselInstance.next();
            }
          });
        });

        // Configurar Lightbox de Pantalla Completa
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');
        const closeBtn = document.getElementById('lightbox-close');
        
        function openLightbox(imgSrc, imgAlt) {
          lightboxImg.src = imgSrc;
          lightboxImg.alt = imgAlt || '';
          lightbox.classList.add('active');
          document.body.style.overflow = 'hidden';
        }
        
        function closeLightbox() {
          lightbox.classList.remove('active');
          document.body.style.overflow = '';
        }
        
        // Delegación de eventos para abrir al hacer click en cualquier imagen del contenedor
        document.getElementById('proyectos-container').addEventListener('click', event => {
          const img = event.target.closest('img');
          if (img) {
            openLightbox(img.src, img.alt);
          }
        });
        
        // Cerrar al hacer click en la cruz
        closeBtn.addEventListener('click', closeLightbox);
        
        // Cerrar al hacer click fuera de la imagen
        lightbox.addEventListener('click', event => {
          if (event.target === lightbox) {
            closeLightbox();
          }
        });
        
        // Cerrar con la tecla Escape
        document.addEventListener('keydown', event => {
          if (event.key === 'Escape') {
            closeLightbox();
          }
        });
      })
      .catch(err => console.error('Error trayendo datos:', err));
  </script>

  <script>
    const canvas = document.getElementById('starfield');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const LAYERS = [
      { count: 60, speed: 0.06, size: 0.7,  alpha: 0.25 },
      { count: 35, speed: 0.14, size: 1.1,  alpha: 0.45 },
      { count: 15, speed: 0.22, size: 1.6,  alpha: 0.65 },
    ];

    const stars = [];
    LAYERS.forEach(l => {
      for (let i = 0; i < l.count; i++) {
        stars.push({
          x:     Math.random() * window.innerWidth,
          y:     Math.random() * window.innerHeight,
          size:  l.size + Math.random() * 0.5,
          alpha: l.alpha * (0.7 + Math.random() * 0.3),
          dx:    (Math.random() - 0.5) * l.speed,
          dy:    (Math.random() - 0.5) * l.speed * 0.4,
        });
      }
    });

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const s of stars) {
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(220, 220, 230, ${s.alpha})`;
        ctx.fill();
        s.x += s.dx;
        s.y += s.dy;
        if (s.x < -2) s.x = canvas.width + 2;
        if (s.x > canvas.width + 2) s.x = -2;
        if (s.y < -2) s.y = canvas.height + 2;
        if (s.y > canvas.height + 2) s.y = -2;
      }
      requestAnimationFrame(draw);
    }
    draw();
  </script>

  <!-- Lightbox de Pantalla Completa -->
  <div id="lightbox" class="lightbox-overlay">
    <button id="lightbox-close" class="lightbox-close-btn">&times;</button>
    <img id="lightbox-img" class="lightbox-image" src="" alt="Pantalla completa">
  </div>
</body>
